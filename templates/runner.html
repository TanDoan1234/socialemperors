<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Emperors - System Administration Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --medieval-dark: #120a04;
            --medieval-wood: #2a1a0c;
            --medieval-wood-light: #5c3a21;
            --medieval-border: #c5a059;
            --medieval-gold: #ffd700;
            --text-gold: #ffd700;
            --text-light: #f5edd6;
            --text-muted: #a08c75;
            --danger: #8b0000;
            --danger-bright: #ff3333;
            --success: #2e8b57;
            --success-bright: #3cb371;
            --warning: #cc8400;
            --warning-bright: #ffaa00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background: url('/assets/images_new/CESPED.jpg') repeat;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
            z-index: 1;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            pointer-events: none;
            z-index: -1;
        }

        /* Container & Header */
        .wrapper {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 2;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 4px solid var(--medieval-border);
            border-radius: 8px;
            background: linear-gradient(rgba(35, 20, 10, 0.88), rgba(35, 20, 10, 0.88)), url('/assets/images_new/generic_bg.png') repeat;
            padding: 18px 24px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }

        .header-logo-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-logo-group img {
            height: 55px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }

        .title-group h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.7rem;
            color: var(--medieval-gold);
            text-shadow: 2px 2px 0px #000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .title-group p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 700;
            text-shadow: 1px 1px 0px #000;
        }

        /* Layout Grid */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            flex: 1;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: linear-gradient(rgba(35, 20, 10, 0.88), rgba(35, 20, 10, 0.88)), url('/assets/images_new/generic_bg.png') repeat;
            border: 3px solid var(--medieval-border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,0,0,0.5);
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--text-gold);
            text-transform: uppercase;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--medieval-border);
            padding-bottom: 8px;
            text-shadow: 2px 2px 0 #000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Status Widget */
        .status-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            text-align: center;
            padding: 25px 20px;
        }

        .status-indicator {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            border: 4px solid var(--medieval-border);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 4px 8px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.4);
        }

        .status-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px #000;
        }

        /* Status states */
        .status-offline {
            color: var(--danger-bright);
        }
        .status-offline .status-indicator {
            background: rgba(139, 0, 0, 0.25);
            border-color: var(--danger-bright);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.4), inset 0 0 15px rgba(0,0,0,0.8);
        }

        .status-online {
            color: var(--success-bright);
        }
        .status-online .status-indicator {
            background: rgba(46, 139, 87, 0.25);
            border-color: var(--success-bright);
            box-shadow: 0 0 20px rgba(60, 179, 113, 0.5), inset 0 0 15px rgba(0,0,0,0.8);
        }

        .status-starting {
            color: var(--warning-bright);
        }
        .status-starting .status-indicator {
            background: rgba(204, 132, 0, 0.25);
            border-color: var(--warning-bright);
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.5), inset 0 0 15px rgba(0,0,0,0.8);
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 25px rgba(255, 170, 0, 0.7), inset 0 0 15px rgba(0,0,0,0.8); }
        }

        /* Buttons & Actions */
        .action-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 18px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
            border: 2px solid transparent;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: all 0.15s;
            color: #fff;
            width: 100%;
        }

        .btn-start {
            background: var(--success);
            border-color: var(--success-bright);
        }
        .btn-start:hover:not(:disabled) {
            background: var(--success-bright);
            box-shadow: 0 0 15px rgba(60, 179, 113, 0.6);
            transform: translateY(-1px);
        }

        .btn-stop {
            background: var(--danger);
            border-color: var(--danger-bright);
        }
        .btn-stop:hover:not(:disabled) {
            background: var(--danger-bright);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.6);
            transform: translateY(-1px);
        }

        .btn-restart {
            background: var(--warning);
            border-color: var(--warning-bright);
        }
        .btn-restart:hover:not(:disabled) {
            background: var(--warning-bright);
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.6);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            transform: none !important;
        }

        /* Navigation links */
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--medieval-wood-light);
            padding: 12px 16px;
            border-radius: 6px;
            text-decoration: none;
            color: var(--text-light);
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-shadow: 1px 1px 0px #000;
        }

        .nav-item:hover {
            border-color: var(--medieval-gold);
            background: rgba(184, 134, 11, 0.2);
            transform: translateX(4px);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .nav-item span {
            color: var(--text-gold);
        }

        /* Main Content Console */
        .console-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 160px);
            min-height: 550px;
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(rgba(35, 20, 10, 0.88), rgba(35, 20, 10, 0.88)), url('/assets/images_new/generic_bg.png') repeat;
            border: 3px solid var(--medieval-border);
            border-bottom: none;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            padding: 14px 20px;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.05rem;
            color: var(--text-gold);
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .console-actions {
            display: flex;
            gap: 10px;
        }

        .console-btn {
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--medieval-border);
            color: var(--text-light);
            font-size: 0.75rem;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            text-transform: uppercase;
            font-weight: 800;
        }

        .console-btn:hover {
            color: #000;
            border-color: var(--medieval-gold);
            background: var(--medieval-gold);
            box-shadow: 0 0 10px rgba(255,215,0,0.4);
        }

        .console-body {
            flex: 1;
            background: #080604;
            border: 3px solid var(--medieval-border);
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            padding: 18px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #d1c2a5;
            box-shadow: inset 0 6px 20px rgba(0,0,0,0.9);
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Custom Scrollbar */
        .console-body::-webkit-scrollbar {
            width: 10px;
        }
        .console-body::-webkit-scrollbar-track {
            background: #080604;
        }
        .console-body::-webkit-scrollbar-thumb {
            background: #4a2f13;
            border-radius: 5px;
            border: 2px solid var(--medieval-wood-light);
        }
        .console-body::-webkit-scrollbar-thumb:hover {
            background: var(--medieval-border);
        }

        .system-notice {
            color: #55aaff;
            font-weight: bold;
        }

        .system-error {
            color: #ff5555;
            font-weight: bold;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(rgba(35, 20, 10, 0.92), rgba(35, 20, 10, 0.92)), url('/assets/images_new/generic_bg.png') repeat;
            border: 3px solid var(--medieval-border);
            border-radius: 6px;
            padding: 14px 22px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
            color: var(--text-light);
            font-weight: 800;
            z-index: 100;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
            text-shadow: 1px 1px 0px #000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="header-logo-group">
                <img src="/img/logo.png" alt="Social Empires Logo">
                <div class="title-group">
                    <h1>Social Emperors Manager</h1>
                    <p>System Administration & Process Control Panel</p>
                </div>
            </div>
            <div>
                <a href="http://127.0.0.1:5050/admin" target="_blank" class="nav-item" style="border-color: var(--medieval-gold); background: rgba(184, 134, 11, 0.2);">
                    Open GM Panel <span>➔</span>
                </a>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar with controls -->
            <div class="side-panel">
                <!-- Status card -->
                <div class="card status-widget" id="status-card-container">
                    <div class="status-indicator">⚔️</div>
                    <div>
                        <div class="status-text" id="status-label">Checking...</div>
                    </div>
                </div>

                <!-- Actions card -->
                <div class="card">
                    <div class="card-title">🛡️ Server Controls</div>
                    <div class="action-list">
                        <button class="btn btn-start" id="btn-start" onclick="controlServer('start')">Start Server</button>
                        <button class="btn btn-stop" id="btn-stop" onclick="controlServer('stop')">Stop Server</button>
                        <button class="btn btn-restart" id="btn-restart" onclick="controlServer('restart')">Restart Server</button>
                    </div>
                </div>

                <!-- Links card -->
                <div class="card">
                    <div class="card-title">🔗 System Links</div>
                    <div class="nav-links">
                        <a href="http://127.0.0.1:5050/" target="_blank" class="nav-item">
                            Game Launcher <span>➔</span>
                        </a>
                        <a href="http://127.0.0.1:5050/admin" target="_blank" class="nav-item">
                            GM Panel <span>➔</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Console terminal log -->
            <div class="console-container">
                <div class="console-header">
                    <span>📜 LIVE CONSOLE STREAM</span>
                    <div class="console-actions">
                        <button class="console-btn" onclick="clearConsole()">Clear Screen</button>
                        <button class="console-btn" onclick="scrollToBottom()">Scroll to Bottom</button>
                    </div>
                </div>
                <div class="console-body" id="console-terminal">Connecting to log stream...</div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">Changes applied!</div>

    <script>
        const statusContainer = document.getElementById('status-card-container');
        const statusLabel = document.getElementById('status-label');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const btnRestart = document.getElementById('btn-restart');
        const terminal = document.getElementById('console-terminal');
        const toast = document.getElementById('toast');

        let isOnline = false;

        function showToast(message) {
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function updateStatusUI(status) {
            statusContainer.className = 'card status-widget';
            
            if (status === 'online') {
                statusContainer.classList.add('status-online');
                statusLabel.innerText = 'Online';
                btnStart.disabled = true;
                btnStop.disabled = false;
                btnRestart.disabled = false;
                isOnline = true;
            } else if (status === 'offline') {
                statusContainer.classList.add('status-offline');
                statusLabel.innerText = 'Offline';
                btnStart.disabled = false;
                btnStop.disabled = true;
                btnRestart.disabled = true;
                isOnline = false;
            } else {
                statusContainer.classList.add('status-starting');
                statusLabel.innerText = 'Starting...';
                btnStart.disabled = true;
                btnStop.disabled = true;
                btnRestart.disabled = true;
                isOnline = false;
            }
        }

        function fetchStatus() {
            fetch('/api/server/status')
                .then(res => res.json())
                .then(data => {
                    updateStatusUI(data.status);
                })
                .catch(err => {
                    updateStatusUI('offline');
                });
        }

        function controlServer(action) {
            if (action === 'restart') {
                updateStatusUI('starting');
                showToast("Requesting server restart...");
            } else if (action === 'start') {
                updateStatusUI('starting');
                showToast("Starting game server...");
            } else if (action === 'stop') {
                showToast("Stopping game server...");
            }

            fetch(`/api/server/${action}`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        showToast(data.message);
                    } else {
                        showToast("Error: " + data.message);
                    }
                    setTimeout(fetchStatus, 1000);
                })
                .catch(err => {
                    showToast("Failed to perform action");
                    fetchStatus();
                });
        }

        function clearConsole() {
            terminal.innerHTML = '[SYSTEM] Console cleared by administrator.\n';
        }

        // Keep console from growing indefinitely
        const maxConsoleLines = 500;
        function appendConsoleLine(line, isSystem = false, isError = false) {
            const lines = terminal.getElementsByTagName('span');
            if (lines.length > maxConsoleLines) {
                terminal.removeChild(lines[0]);
            }
            
            const span = document.createElement('span');
            if (isSystem) {
                span.className = 'system-notice';
            } else if (isError) {
                span.className = 'system-error';
            }
            span.textContent = line;
            terminal.appendChild(span);
        }

        function scrollToBottom() {
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Connect to Server-Sent Events log stream
        function connectLogStream() {
            terminal.innerHTML = '[SYSTEM] Connecting to game server log stream...\n';
            const source = new EventSource('/api/server/logs');

            source.onopen = function() {
                terminal.innerHTML += '[SYSTEM] Log stream connection established.\n';
                scrollToBottom();
            };

            source.onmessage = function(event) {
                if (event.data === ':ping') return;
                
                const line = event.data;
                
                let isSystem = line.includes('[SYSTEM]');
                let isError = line.toLowerCase().includes('error') || line.toLowerCase().includes('exception');
                
                appendConsoleLine(line, isSystem, isError);
                scrollToBottom();
            };

            source.onerror = function(err) {
                terminal.innerHTML += '\n[SYSTEM] Log stream disconnected. Reconnecting in 3s...\n';
                scrollToBottom();
                source.close();
                setTimeout(connectLogStream, 3000);
            };
        }

        // Initialize status polling & connect to logs
        fetchStatus();
        setInterval(fetchStatus, 5000);
        connectLogStream();
    </script>
</body>
</html>
